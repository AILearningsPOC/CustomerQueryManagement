<html lang="en">

<style>
/* ═══════════════════════════════════════════════════════════════
   CQM v2 — Enterprise Design System (Salesforce Lightning Inspired)
   Default: Light Mode
═══════════════════════════════════════════════════════════════ */
:root {
  /* Brand */
  --primary:      #0176D3;
  --primary-dark: #0B5CAB;
  --primary-light:#E8F4FD;
  --accent:       #0176D3;

  /* Semantic */
  --success:      #2E844A;
  --success-bg:   #EEF6F1;
  --warning:      #DD7A01;
  --warning-bg:   #FEF6E6;
  --danger:       #EA001E;
  --danger-bg:    #FEE8EA;
  --info:         #0176D3;
  --info-bg:      #E8F4FD;

  /* Layout */
  --bg:           #F4F6F9;
  --surface:      #FFFFFF;
  --card:         #FFFFFF;
  --border:       #D8DDE6;
  --border-light: #E8ECF2;

  /* Typography */
  --text:         #181818;
  --text-secondary:#5F6A7D;
  --text-muted:   #8896A9;

  /* Elevation */
  --shadow-xs:    0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:    0 2px 8px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
  --shadow-md:    0 4px 16px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:    0 8px 32px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.08);

  /* Sizing */
  --radius-sm:    5px;
  --radius:       8px;
  --radius-lg:    10px;
  --radius-xl:    20px;
  --topbar-h:     48px;
  --sidebar-w:    220px;
  --font:         'Inter', system-ui, sans-serif;

  /* Transitions */
  --t:            150ms ease;
  --t-md:         250ms ease;
}

/* Dark mode overrides */
[data-theme="dark"] {
  --bg:           #0F1117;
  --surface:      #181C24;
  --card:         #1E2330;
  --border:       #2A3042;
  --border-light: #252D3D;
  --text:         #E8EAF0;
  --text-secondary:#8892A4;
  --text-muted:   #5A6475;
  --primary-light:#1A2A3E;
  --success-bg:   #0D2318;
  --warning-bg:   #2A1E06;
  --danger-bg:    #2A0A0E;
  --info-bg:      #0C1E30;
  --shadow-xs:    0 1px 3px rgba(0,0,0,.3);
  --shadow-sm:    0 2px 8px rgba(0,0,0,.4);
  --shadow-md:    0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:    0 8px 32px rgba(0,0,0,.6);
}

/* ── RESET ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: 13px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: var(--primary); }
button { font-family: inherit; cursor: pointer; }

/* ── LAYOUT ─────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width var(--t-md); z-index: 100; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
#content { flex: 1; overflow-y: auto; padding: 20px 24px; background: var(--bg); }

/* ── TOPBAR ─────────────────────────────────────────────────────── */
#topbar {
  height: var(--topbar-h);
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-bottom: none; display: flex;
  align-items: center; padding: 0 24px; gap: 12px;
  flex-shrink: 0; box-shadow: 0 2px 12px rgba(1,118,211,.3); position: relative; z-index: 50;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; margin-right: 8px; }
.topbar-logo .logo-icon { width: 30px; height: 30px; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 11px; letter-spacing: .05em; flex-shrink: 0; }
.topbar-logo .logo-text { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }
.topbar-logo .logo-sub { font-size: 11px; color: rgba(255,255,255,.7); }
.topbar-divider { width: 1px; height: 28px; background: rgba(255,255,255,.25); flex-shrink: 0; }
.topbar-search { flex: 1; max-width: 340px; position: relative; }
.topbar-search input { width: 100%; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 8px 12px 8px 36px; border-radius: var(--radius); font-size: 13px; font-family: inherit; transition: border-color var(--t), box-shadow var(--t); }
.topbar-search input::placeholder { color: rgba(255,255,255,.6); }
.topbar-search input:focus { outline: none; border-color: rgba(255,255,255,.6); box-shadow: 0 0 0 3px rgba(255,255,255,.15); background: rgba(255,255,255,.2); }
.topbar-search .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.7); font-size: 13px; pointer-events: none; }
.topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.topbar-controls { display: flex; align-items: center; gap: 8px; }
.icon-btn { width: 30px; height: 30px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.15); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; transition: all var(--t); }
.icon-btn:hover { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.5); }
.health-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,.8); padding: 5px 10px; border-radius: var(--radius-sm); background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); }

/* Scraping controls in topbar */
.scraping-controls { display: flex; align-items: center; gap: 8px; }
.toggle-group { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,.9); white-space: nowrap; }
.toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 20px; cursor: pointer; transition: var(--t); }
.toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: var(--t); box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle-switch input:checked + .toggle-slider { background: var(--primary); }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }
.engine-toggle { display: flex; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.4); border-radius: var(--radius-sm); overflow: hidden; }
.engine-btn { padding: 5px 11px; cursor: pointer; color: rgba(255,255,255,.95); transition: all var(--t); border: none; background: transparent; font-size: 11px; font-weight: 600; font-family: inherit; opacity: 1 !important; pointer-events: all !important; }
.engine-btn:hover { background: rgba(255,255,255,.2); }
.engine-btn.active { background: rgba(255,255,255,.95); color: var(--primary-dark); font-weight: 700; }
.role-selector { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,.85); }
.role-selector select { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; padding: 5px 10px; border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; cursor: pointer; }
.role-selector select option { background: var(--primary-dark); color: #fff; }

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
.sidebar-header { padding: 14px 14px 12px; border-bottom: 1px solid var(--border-light); }
.sidebar-brand { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: var(--primary); text-transform: uppercase; }
.sidebar-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }
.sidebar-hisense { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
nav { flex: 1; padding: 10px 10px; overflow-y: auto; }
.nav-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; padding: 10px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; border-radius: var(--radius-sm); transition: all var(--t); color: var(--text-secondary); font-size: 13px; font-weight: 500; position: relative; margin-bottom: 1px; text-decoration: none; }
.nav-item:hover { background: var(--primary-light); color: var(--primary); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--primary); border-radius: 0 3px 3px 0; }
.nav-item .nav-icon { width: 18px; text-align: center; font-size: 14px; flex-shrink: 0; }
.nav-badge { background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-left: auto; min-width: 18px; text-align: center; }
.sidebar-footer { padding: 14px 16px; border-top: 1px solid var(--border-light); }
.sidebar-footer-info { font-size: 11px; color: var(--text-muted); }

/* ── PAGE HEADER ─────────────────────────────────────────────────── */
.page-header { margin-bottom: 12px; }
.page-header h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.1px; }
.page-header p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.breadcrumb span { color: var(--text-muted); }

/* ── CARDS ───────────────────────────────────────────────────────── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; box-shadow: var(--shadow-xs); transition: box-shadow var(--t-md); margin-bottom: 16px; }
.card:hover { box-shadow: var(--shadow-sm); }
.card-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.card-title i { color: var(--primary); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.card-header-title { font-size: 16px; font-weight: 700; color: var(--text); }

/* ── KPI STATS ───────────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-xs); transition: all var(--t-md); position: relative; overflow: hidden; }
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--primary); border-radius: var(--radius-lg) var(--radius-lg) 0 0; opacity: 0; transition: opacity var(--t); }
.stat-card:hover::before { opacity: 1; }
.stat-icon { width: 32px; height: 32px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 15px; margin-bottom: 10px; }
.stat-value { font-size: 24px; font-weight: 800; line-height: 1; letter-spacing: -.3px; color: var(--text); }
.stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; font-weight: 500; }
.stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.stat-card.primary .stat-icon { background: var(--primary-light); color: var(--primary); }
.stat-card.primary .stat-value { color: var(--primary); }
.stat-card.success .stat-icon { background: var(--success-bg); color: var(--success); }
.stat-card.success .stat-value { color: var(--success); }
.stat-card.warning .stat-icon { background: var(--warning-bg); color: var(--warning); }
.stat-card.warning .stat-value { color: var(--warning); }
.stat-card.danger .stat-icon { background: var(--danger-bg); color: var(--danger); }
.stat-card.danger .stat-value { color: var(--danger); }
.stat-card.info .stat-icon { background: var(--info-bg); color: var(--info); }
.stat-card.info .stat-value { color: var(--info); }

/* ── CHARTS ──────────────────────────────────────────────────────── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.chart-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-xs); }
.chart-box h3 { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
canvas { max-height: 180px; }

/* ── TABLES ──────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; z-index: 1; }
th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; background: var(--bg); border-bottom: 2px solid var(--border); white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; font-size: 13px; color: var(--text); }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background var(--t); }
tbody tr:hover td { background: var(--primary-light); }
.truncate { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── BADGES ──────────────────────────────────────────────────────── */
.badge-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-green  { background: var(--success-bg); color: var(--success); border: 1px solid rgba(46,132,74,.2); }
.badge-red    { background: var(--danger-bg);  color: var(--danger);  border: 1px solid rgba(234,0,30,.2); }
.badge-yellow { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(221,122,1,.2); }
.badge-blue   { background: var(--info-bg);    color: var(--primary); border: 1px solid rgba(1,118,211,.2); }
.badge-purple { background: #F3EEFF; color: #6B21A8; border: 1px solid rgba(107,33,168,.2); }
.badge-orange { background: #FEF3E6; color: #C25D00; border: 1px solid rgba(194,93,0,.2); }
.badge-gray   { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
[data-theme="dark"] .badge-purple { background: #2D1A4A; color: #C084FC; }
[data-theme="dark"] .badge-orange { background: #2A1800; color: #FB923C; }

/* ── BUTTONS ─────────────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all var(--t); white-space: nowrap; font-family: inherit; letter-spacing: .01em; }
.btn:active { transform: translateY(1px); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; box-shadow: 0 2px 6px rgba(1,118,211,.3); }
.btn-primary:hover { box-shadow: 0 4px 12px rgba(1,118,211,.4); transform: translateY(-1px); }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.btn-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(46,132,74,.3); }
.btn-success:hover { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(234,0,30,.2); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-xs { padding: 3px 8px; font-size: 11px; }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

/* ── FORMS ───────────────────────────────────────────────────────── */
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); padding: 7px 11px; border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; transition: border-color var(--t), box-shadow var(--t);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(1,118,211,.12);
}
.form-textarea { resize: vertical; min-height: 90px; }
.form-select { cursor: pointer; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

/* ── FILTERS ROW ─────────────────────────────────────────────────── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.filters .form-select { width: auto; padding: 7px 11px; font-size: 12px; }
.filters .form-input { width: 220px; padding: 7px 11px; font-size: 12px; }

/* ── SECTION HEADER ──────────────────────────────────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
.section-title { font-size: 17px; font-weight: 700; color: var(--text); }

/* ── EXPAND PANEL ────────────────────────────────────────────────── */
.expand-row { display: none; }
.expand-row.open { display: table-row; }
.expand-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin: 6px 0; }
.expand-panel h4 { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }

/* ── AGENT CARDS ─────────────────────────────────────────────────── */
.agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.agent-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-xs); transition: all var(--t-md); }
.agent-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.agent-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; margin-bottom: 12px; }
.agent-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
.agent-role { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }
.agent-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border-light); }
.agent-stat { text-align: center; }
.agent-stat .val { font-size: 18px; font-weight: 800; color: var(--text); }
.agent-stat .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.sla-alert { color: var(--danger) !important; }

/* ── UPLOAD ZONE ─────────────────────────────────────────────────── */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 28px 20px; text-align: center; cursor: pointer; transition: all var(--t-md); background: var(--bg); }
.upload-zone:hover, .upload-zone.drag { border-color: var(--primary); background: var(--primary-light); }
.upload-zone .upload-icon { font-size: 40px; color: var(--primary); margin-bottom: 12px; }
.upload-zone p { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
.upload-zone .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

/* ── SCRAPE LOGS ─────────────────────────────────────────────────── */
.log-entry { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px; margin-bottom: 6px; font-size: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow-xs); transition: box-shadow var(--t); }
.log-entry:hover { box-shadow: var(--shadow-sm); }
.log-entry.has-error { border-color: rgba(234,0,30,.3); background: var(--danger-bg); }
.log-time { color: var(--text-muted); white-space: nowrap; font-size: 11px; }

/* ── PDF PREVIEW ─────────────────────────────────────────────────── */
.pdf-preview { width: 100%; height: 520px; border: 1px solid var(--border); border-radius: var(--radius); background: #fff; }

/* ── INNER TABS ──────────────────────────────────────────────────── */
.tab-bar { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; gap: 0; }
.tab-btn { padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all var(--t); font-family: inherit; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn:hover { color: var(--text); }

/* ── TOAST ───────────────────────────────────────────────────────── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); padding: 13px 20px; border-radius: var(--radius); font-size: 13px; z-index: 9999; max-width: 340px; box-shadow: var(--shadow-lg); transform: translateY(100px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); display: flex; align-items: center; gap: 10px; font-weight: 500; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--danger); }
.toast.info { border-left: 4px solid var(--primary); }

/* ── PAGINATION ──────────────────────────────────────────────────── */
.pagination { display: flex; gap: 5px; align-items: center; margin-top: 14px; justify-content: flex-end; }
.page-btn { padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text); transition: all var(--t); font-weight: 500; font-family: inherit; }
.page-btn:hover { border-color: var(--primary); color: var(--primary); }
.page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── CONFIDENCE BAR ──────────────────────────────────────────────── */
.confidence-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
.confidence-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* ── EMPTY STATE ─────────────────────────────────────────────────── */
.empty { text-align: center; padding: 36px 24px; }
.empty-icon { font-size: 36px; color: var(--border); margin-bottom: 12px; }
.empty-title { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
.empty-sub { font-size: 12px; color: var(--text-muted); max-width: 360px; margin: 0 auto 20px; line-height: 1.6; }

/* ── SKELETON LOADING ────────────────────────────────────────────── */
.skeleton { background: linear-gradient(90deg, var(--border-light) 25%, var(--border) 50%, var(--border-light) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-row { display: flex; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border-light); }
.skeleton-row .sk-cell { height: 14px; border-radius: 4px; }

/* ── WELCOME BANNER ──────────────────────────────────────────────── */
.welcome-banner { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: var(--radius-lg); padding: 16px 22px; color: #fff; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; box-shadow: 0 4px 20px rgba(1,118,211,.3); }
.welcome-text h2 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.welcome-text p { font-size: 12px; opacity: .85; }
.welcome-actions { display: flex; gap: 10px; flex-shrink: 0; }
.btn-white { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.3); backdrop-filter: blur(4px); }
.btn-white:hover { background: rgba(255,255,255,.3); transform: translateY(-1px); }

/* ── MISC ────────────────────────────────────────────────────────── */
.flex { display: flex; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.items-center { align-items: center; }
.text-muted { color: var(--text-muted); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-primary { color: var(--primary); }
.loading { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  #sidebar { width: 64px; }
  .sidebar-header .sidebar-sub,
  .sidebar-header .sidebar-hisense,
  .nav-section-label,
  .sidebar-footer-info { display: none; }
  .sidebar-header { padding: 12px 8px; text-align: center; }
  .sidebar-header .sidebar-brand { font-size: 9px; letter-spacing: .05em; }
  .nav-item { justify-content: center; padding: 10px 0; }
  .nav-item > span:not(.nav-icon):not(.nav-badge) { display: none; }
  .nav-item .nav-icon { width: 28px; font-size: 18px; }
  .nav-item::before { display: none; }
  .nav-badge { position: absolute; top: 4px; right: 4px; min-width: 14px; padding: 1px 4px; font-size: 9px; }
  #content { padding: 16px; }
  .chart-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .welcome-banner { flex-direction: column; }
}
@media (max-width: 600px) {
  .topbar-search, .topbar-divider { display: none; }
  .scraping-controls { gap: 4px; }
  .engine-toggle { display: none; }
}
</style>
</head>
<body>
<div id="app">

<!-- ═══ SIDEBAR ════════════════════════════════════════════════════ -->
<div id="sidebar">
  <div class="sidebar-header">

  </div>
  <nav id="nav">

<!-- ═══ MAIN ═══════════════════════════════════════════════════════ -->
<div id="main">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-logo">
      <div class="logo-icon">CQM</div>
      <div>
        <div class="logo-text" id="page-title">Dashboard</div>

        🌙

        <select id="role-select" onchange="setRole(this.value)">

    <div id="tab-answer-queue" style="display:none"></div>
    <div id="tab-knowledge-base" style="display:none"></div>
    <div id="tab-agents" style="display:none"></div>
    <div id="tab-scrape-logs" style="display:none"></div>

    <div id="tab-config" style="display:none"></div>
  </div>

<div class="toast" id="toast"></div>

<script>
// ================================================================
// CQM v2 — Frontend JS
// ================================================================

// Close PDF modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('pdf-modal-overlay');
    if (modal) modal.remove();
  }
});

// Global error boundary — catch any uncaught JS errors
window.addEventListener('error', (e) => {
  console.error('Uncaught error:', e.error || e.message);
  try { toast('Unexpected error: ' + (e.message || 'Unknown error'), 'error'); } catch(ex) {}
});

window.addEventListener('unhandledrejection', (e) => {
  console.error('Unhandled promise rejection:', e.reason);
  const msg = e.reason?.message || String(e.reason) || 'Unknown error';
  try { toast('Error: ' + msg, 'error'); } catch(ex) {}
  e.preventDefault(); // Prevent "Uncaught" in console
});

function getAPI() {
  return (localStorage.getItem('cqm_api_url') || 'https://customerquerymanagement.onrender.com/api').replace(/\/$/, '');
}
let API = getAPI();

let currentTab = 'dashboard';
let currentRole = 'admin';
let scrapingConfig = { auto_enabled: true, engine: 'apify', interval_minutes: 10 };
let dashCharts = {};
let reviewPage = 1, answerPage = 1;
// Filter state persistence
let filterState = {
  rq: { retailer: '', category: '', sentiment: '' },
  aq: { retailer: '', category: '' },
  kb: { search: '', category: '', source: '' }
};

// ── THEME ──────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  localStorage.setItem('cqm_theme', theme);
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const current = localStorage.getItem('cqm_theme') || 'light';
  applyTheme(current === 'light' ? 'dark' : 'light');
}

// ── INIT ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try { applyTheme(localStorage.getItem('cqm_theme') || 'light'); } catch(e) { console.error('Theme error:', e); }
  try { if (!localStorage.getItem('cqm_api_url')) showApiSetup(); } catch(e) { console.error('API setup error:', e); }
  try { await loadConfig(); } catch(e) { console.warn('Config load failed (non-fatal):', e.message); }
  try { await checkHealth(); } catch(e) { console.warn('Health check failed (non-fatal):', e.message); }
  try {
    showTab('dashboard');
  } catch(e) {
    console.error('showTab failed:', e);
    // Last resort: show content area anyway
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
    const dash = document.getElementById('tab-dashboard');
    if (dash) { dash.style.display = ''; dash.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Dashboard failed to load</div><div class="empty-sub">Please check your API URL in Configuration.</div></div>'; }
  }
  setInterval(() => { try { checkHealth(); } catch(e) {} }, 30000);
  setInterval(() => { try { if (currentTab === 'review-queue') loadReviewQueue(); } catch(e) {} }, 60000);
});

function showApiSetup() {
  const existing = document.getElementById('api-setup-banner');
  if (existing) return;
  const banner = document.createElement('div');
  banner.id = 'api-setup-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:10000;background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.2)';
  banner.innerHTML = `
    ⚙️
    <span style="font-weight:600">Set your backend API URL to connect:</span>
    <input id="api-url-input" type="text" placeholder="https://your-app.onrender.com/api"
      style="flex:1;padding:7px 12px;border-radius:6px;border:none;font-size:13px;max-width:400px;color:#181818">
    <button onclick="saveApiUrl()" style="background:#fff;color:var(--primary);border:none;padding:7px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px">Save</button>
    <button onclick="document.getElementById('api-setup-banner').remove()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px">Skip</button>`;
  document.body.prepend(banner);
}

function saveApiUrl() {
  const input = document.getElementById('api-url-input')?.value?.trim();
  if (!input) return;
  const url = input.endsWith('/api') ? input : input.replace(/\/$/, '') + '/api';
  localStorage.setItem('cqm_api_url', url);
  API = url;
  document.getElementById('api-setup-banner')?.remove();
  toast('API URL saved', 'success');
  setTimeout(() => location.reload(), 800);
}

// ── TOAST ──────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  try {
    const t = document.getElementById('toast');
    if (!t) return console.log(`[toast:${type}] ${msg}`);
    t.innerHTML = msg;
    t.className = `toast show ${type}`;
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => { try { t.classList.remove('show'); } catch(e){} }, 3500);
  } catch(e) { console.error('Toast error:', e); }
}

// ── HEALTH ─────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const data = await apiFetch('/health');
    const el = document.getElementById('health-indicator');
    if (data.status === 'ok') {
      el.innerHTML = `<span style="color:var(--success)">● Connected</span> · ${data.counts?.questions||0} questions`;
    } else {
      el.innerHTML = `<span style="color:var(--danger)">● Error</span>`;
    }
    updateReviewBadge(data.counts?.review || 0);
  } catch {
    const el = document.getElementById('health-indicator');
    if (el) el.innerHTML = `<span style="color:var(--danger)">● Offline</span>`;
  }
}

function updateReviewBadge(count) {
  const badge = document.getElementById('review-badge');
  if (count > 0) { badge.textContent = count; badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

// ── API HELPER ─────────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  if (!API) throw new Error('API URL not configured. Go to Configuration and set your backend URL.');
  try {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...options.headers },
      ...options
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || `HTTP ${res.status}: ${res.statusText}`);
    }
    return res.json();
  } catch(e) {
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      throw new Error('Cannot reach backend. Check your API URL in Configuration or verify the backend is running.');
    }
    throw e;
  }
}

// ── TAB NAVIGATION ─────────────────────────────────────────────────
function showTab(tab) {
  try {
    // Hide all tabs, show selected
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
    const tabEl = document.getElementById('tab-' + tab);
    if (!tabEl) { console.error('Tab element not found: tab-' + tab); return; }
    tabEl.style.display = '';
    currentTab = tab;

    // Update nav active state
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navEl = document.querySelector('[data-tab="' + tab + '"]');
    if (navEl) navEl.classList.add('active');

    // Update page title
    const titles = {
      'dashboard':'Dashboard','scrape-targets':'Scrape Targets','review-queue':'Review Queue',
      'answer-queue':'Answered Questions','knowledge-base':'Knowledge Base','agents':'Agents',
      'scrape-logs':'Scrape Logs','post-answers':'Post Answers','config':'Configuration'
    };
    const titleEl = document.getElementById('page-title');
    if (titleEl) titleEl.textContent = titles[tab] || tab;

    // Load tab content
    const loaders = {
      'dashboard':loadDashboard,'scrape-targets':loadScrapeTargets,'review-queue':loadReviewQueue,
      'answer-queue':loadAnswerQueue,'knowledge-base':loadKB,'agents':loadAgents,
      'scrape-logs':loadScrapeLogs,'post-answers':loadPostAnswers,'config':loadConfig_tab
    };
    if (loaders[tab]) loaders[tab]();
  } catch(e) {
    console.error('showTab error:', e);
  }
}

// ── ROLE ───────────────────────────────────────────────────────────
function setRole(role) {
  currentRole = role;
  applyRoleRestrictions(role);
  // Reload current tab to apply role filters
  showTab(currentTab);
}

function applyRoleRestrictions(role) {
  // Define what each role can see
  const roleAccess = {
    admin:       ['dashboard','scrape-targets','review-queue','answer-queue','knowledge-base','agents','scrape-logs','post-answers','config'],
    manager:     ['dashboard','scrape-targets','review-queue','answer-queue','knowledge-base','agents','scrape-logs','post-answers'],
    agent_alex:  ['review-queue','answer-queue','knowledge-base','post-answers'],
    agent_jamie: ['review-queue','answer-queue','knowledge-base','post-answers'],
  };

  const allowed = roleAccess[role] || roleAccess.admin;

  // Show/hide nav items based on role
  document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
    const tab = item.getAttribute('data-tab');
    const canSee = allowed.includes(tab);
    item.style.display = canSee ? '' : 'none';
  });

  // Show role indicator in topbar
  const roleLabels = {
    admin:       '👑 Admin — Full Access',
    manager:     '📊 Manager — No Config',
    agent_alex:  '🎧 Alex Agent — My Queue Only',
    agent_jamie: '🎧 Jamie Agent — My Queue Only',
  };
  const indicator = document.getElementById('role-indicator');
  if (indicator) {
    indicator.textContent = roleLabels[role] || role;
    indicator.style.color = role.startsWith('agent') ? 'var(--warning)' : role === 'manager' ? 'var(--info)' : 'var(--success)';
  }

  // If current tab not allowed, redirect to first allowed tab
  if (!allowed.includes(currentTab)) {
    const firstAllowed = allowed[0] || 'review-queue';
    showTab(firstAllowed);
  }
}

// ── SCRAPING CONTROLS ──────────────────────────────────────────────
async function loadConfig() {
  try {
    const cfg = await apiFetch('/config');
    scrapingConfig = cfg.scraping_config || scrapingConfig;
    const autoToggle = document.getElementById('auto-toggle');
    if (autoToggle) autoToggle.checked = scrapingConfig.auto_enabled;
    setEngineUI(scrapingConfig.engine || 'scraperapi');
  } catch(e) {
    console.warn('loadConfig failed:', e.message);
    // Non-fatal: use defaults
  }
}

function setEngineUI(engine) {
  document.getElementById('engine-scraperapi').classList.toggle('active', engine === 'scraperapi');
  document.getElementById('engine-apify').classList.toggle('active', engine === 'apify');
}

async function setEngine(engine) {
  // Update UI immediately — don't wait for API
  scrapingConfig.engine = engine;
  setEngineUI(engine);
  // Save to backend async
  try {
    await saveScrapingConfig();
    toast(`Engine switched to ${engine}`, 'success');
  } catch(e) {
    console.warn('Engine config save failed (non-fatal):', e.message);
    // Keep the UI change even if save fails
  }
}

async function toggleAuto(enabled) {
  scrapingConfig.auto_enabled = enabled;
  try {
    await saveScrapingConfig();
    toast(enabled ? 'Auto-scraping enabled' : 'Auto-scraping paused', 'info');
  } catch(e) {
    console.warn('Auto toggle save failed:', e.message);
  }
}

async function saveScrapingConfig() {
  try {
    await apiFetch('/scrape/config', { method: 'POST', body: JSON.stringify(scrapingConfig) });
  } catch (e) { toast('Config save failed: ' + e.message, 'error'); }
}

async function scrapeNow() {
  const btn = document.getElementById('scrape-now-btn');
  btn.disabled = true; btn.innerHTML = '⏳ Scraping...';
  try {
    const result = await apiFetch('/scrape/now', { method: 'POST' });
    toast(`Scraped ${result.scraped||0} targets · ${result.logs?.reduce((s,l)=>s+l.new_count,0)||0} new questions`, 'success');
    if (currentTab === 'dashboard') loadDashboard();
    if (currentTab === 'review-queue') loadReviewQueue();
    checkHealth();
  } catch (e) { toast('Scrape failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '⚡ Scrape Now'; }
}

// ── DASHBOARD ──────────────────────────────────────────────────────
async function loadDashboard() {
  const el = document.getElementById('tab-dashboard');
  el.innerHTML = skeletonDashboard();
  try {
    const s = await apiFetch('/dashboard/stats');
    Object.values(dashCharts).forEach(c => c.destroy());
    dashCharts = {};

    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

    el.innerHTML = `
    <div class="welcome-banner">
      <div class="welcome-text">
        <h2>${greeting} — CQM Operations Dashboard</h2>
        <p>Monitor customer questions, AI performance, and agent workload across BestBuy, Amazon and Target.</p>
      </div>
      <div class="welcome-actions">
        <button class="btn btn-white btn-sm" onclick="scrapeNow()">⚡ Scrape Now</button>
        <button class="btn btn-white btn-sm" onclick="showTab('review-queue')">🔍 Review Queue ${s.review>0?`<span style="background:var(--danger);border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px">${s.review}</span>`:''}</button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card primary">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${s.total||0}</div>
        <div class="stat-label">Total Questions</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card success">
        <div class="stat-icon">✅</div>

function renderCharts(s) {
  const COLORS = ['#0176D3','#2E844A','#DD7A01','#EA001E','#7C3AED','#0891B2','#DB2777','#65A30D'];
  const isDark = localStorage.getItem('cqm_theme') === 'dark';
  const legendColor = isDark ? '#8892A4' : '#5F6A7D';
  const gridColor = isDark ? '#2A3042' : '#E8ECF2';

  const doughnutCfg = (labels, data) => ({
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: COLORS.slice(0,labels.length), borderWidth: 2, borderColor: isDark ? '#1E2330' : '#fff' }] },
    options: { responsive:true, maintainAspectRatio:true, cutout:'65%',
      plugins: { legend: { position:'right', labels:{ color:legendColor, font:{size:11}, boxWidth:12, padding:8 } } } }
  });

  const catLabels = Object.keys(s.by_category||{});
  if (catLabels.length) dashCharts.cat = new Chart(document.getElementById('chart-category'), doughnutCfg(catLabels, catLabels.map(k=>s.by_category[k])));

  const sentLabels = Object.keys(s.by_sentiment||{});
  if (sentLabels.length) dashCharts.sent = new Chart(document.getElementById('chart-sentiment'), doughnutCfg(sentLabels, sentLabels.map(k=>s.by_sentiment[k])));

  const retLabels = Object.keys(s.by_retailer||{});
  if (retLabels.length) dashCharts.ret = new Chart(document.getElementById('chart-retailer'), doughnutCfg(retLabels, retLabels.map(k=>s.by_retailer[k])));

  const trend = s.trend || [];
  if (trend.length) {
    dashCharts.trend = new Chart(document.getElementById('chart-trend'), {
      type: 'line',
      data: { labels: trend.map(d=>d.date),
        datasets: [
          { label:'Total', data:trend.map(d=>d.total), borderColor:'#0176D3', backgroundColor:'rgba(1,118,211,.08)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#0176D3' },
          { label:'Answered', data:trend.map(d=>d.answered), borderColor:'#2E844A', backgroundColor:'rgba(46,132,74,.08)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#2E844A' }
        ]
      },
      options: { responsive:true, maintainAspectRatio:true,
        plugins: { legend: { labels:{ color:legendColor, font:{size:11} } } },
        scales: {
          x: { ticks:{ color:legendColor, font:{size:10} }, grid:{ color:gridColor } },
          y: { ticks:{ color:legendColor, font:{size:10} }, grid:{ color:gridColor } }
        }
      }
    });
  }
}

async function uploadExcel(file) {
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`${API}/scrape-targets/upload`, { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    toast(`${data.inserted} targets uploaded successfully`, 'success');
    document.getElementById('upload-area').innerHTML = '';
    await refreshTargets();
  } catch (e) { toast('Upload failed: ' + e.message, 'error'); }
}

function getAgentFilter() {
  // Agents only see their own assigned questions
  if (currentRole === 'agent_alex')  return 'Alex Agent';
  if (currentRole === 'agent_jamie') return 'Jamie Agent';
  // Manager sees all, Admin sees all
  return '';
}

function canPerformAction(action) {
  // Define what each role can do
  const permissions = {
    admin:       ['scrape','config','delete','approve','assign','post','kb_edit','agent_manage'],
    manager:     ['approve','assign','kb_edit'],
    agent_alex:  ['approve'],
    agent_jamie: ['approve'],
  };
  const allowed = permissions[currentRole] || permissions.admin;
  return allowed.includes(action);
}

function buildReviewActions(id) {
  const isAgent = currentRole.startsWith('agent');
  const isManager = currentRole === 'manager';
  const isAdmin = currentRole === 'admin';

  let html = '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
  html += `<button class="btn btn-secondary btn-sm" onclick="saveDraft('${id}')">💾 Save Draft</button>`;
  html += `<button class="btn btn-success btn-sm" onclick="approveQuestion('${id}',false)">✓ Approve</button>`;
  html += `<button class="btn btn-primary btn-sm" onclick="approveQuestion('${id}',true)">✓✓ Approve + Add to KB</button>`;

  // Only Admin and Manager can reassign
  if (isAdmin || isManager) {
    html += '<div style="margin-left:auto;display:flex;gap:8px;align-items:center">';
    html += `<select class="form-select" id="assign-${id}" style="width:auto;padding:6px 10px;font-size:12px">`;
    html += '<option value="">Reassign to...</option>';
    html += '<option value="Alex Agent">Alex Agent</option>';
    html += '<option value="Jamie Agent">Jamie Agent</option>';
    html += '<option value="Sarah Manager">Sarah Manager</option>';
    html += '</select>';
    html += `<button class="btn btn-secondary btn-sm" onclick="reassign('${id}')">↻ Reassign</button>`;
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function toggleExpand(id) {
  const row = document.getElementById(`expand-${id}`);
  row.classList.toggle('open');
  const btn = row.previousElementSibling.querySelector(`button`);
  if (btn) btn.innerHTML = row.classList.contains('open')
    ? '▲ Collapse'
    : '▼ Expand';
}

async function saveDraft(id) {
  const answer = document.getElementById(`draft-${id}`)?.value;
  if (answer === undefined) return toast('Draft field not found', 'error');
  try {
    await apiFetch(`/questions/${id}/draft`, { method:'PATCH', body: JSON.stringify({ answer }) });
    toast('Draft saved','success');
  } catch(e) { toast('Save draft failed: ' + e.message, 'error'); }
}

async function approveQuestion(id, addToKB) {
  const answer = document.getElementById(`draft-${id}`)?.value;
  try {
    await apiFetch(`/questions/${id}/approve`, { method:'PATCH', body: JSON.stringify({ answer, add_to_kb: addToKB }) });
    toast(addToKB ? 'Approved & added to Knowledge Base' : 'Answer approved successfully', 'success');
    document.getElementById(`row-${id}`)?.remove();
    document.getElementById(`expand-${id}`)?.remove();
    try { checkHealth(); } catch(e) {}
    // Refresh badge count
    try { const {total} = await apiFetch('/questions?status=review&limit=1'); updateReviewBadge(total||0); } catch(e) {}
  } catch(e) { toast('Approval failed: ' + e.message, 'error'); }
}

async function reassign(id) {
  const agent = document.getElementById('assign-' + id)?.value;
  if (!agent) return toast('Please select an agent to reassign to', 'error');
  try {
    await apiFetch('/questions/' + id + '/assign', { method:'PATCH', body: JSON.stringify({ assigned_to: agent }) });
    toast('Reassigned to ' + agent, 'success');
    await refreshReviewQueue();
  } catch(e) { toast('Reassign failed: ' + e.message, 'error'); }
}

async function renderKBDocs() {
  const el = document.getElementById('kb-docs-section');
  if (!el) return;
  el.innerHTML = '<div class="loading">⏳ Loading documents...</div>';

  try {
    // Get all PDF-sourced KB entries and group by filename
    const { data, total } = await apiFetch('/knowledge-base?source=pdf_manual&limit=100');

    if (!data?.length) {
      el.innerHTML = emptyState('📄', 'No documents uploaded yet', 'Upload a PDF manual to add it to the knowledge base.', 'Upload PDF', "switchKBTab('pdf')");
      return;
    }

    // Group chunks by pdf_filename to show one entry per document
    const docs = {};
    data.forEach(e => {
      const fname = e.pdf_filename || 'unknown';
      if (!docs[fname]) {
        docs[fname] = {
          filename: fname,
          title: e.title ? e.title.replace(/ \(part \d+\/\d+\)$/, '') : fname.replace(/^\d+_/, '').replace(/_/g,' ').replace(/\.pdf$/i,''),
          pdf_url: e.pdf_url,
          category: e.category,
          chunks: 0,
          created_at: e.created_at,
          has_pdf: e.has_pdf
        };
      }
      docs[fname].chunks++;
    });

    const docList = Object.values(docs).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    el.innerHTML = `
    <div class="section-header" style="margin-bottom:16px">
      <div style="font-size:13px;color:var(--text-muted)">${docList.length} document${docList.length!==1?'s':''} uploaded</div>
      <button class="btn btn-primary btn-sm" onclick="switchKBTab('pdf')">⬆️ Upload New PDF</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
      ${docList.map(doc => `
      <div class="card" style="margin-bottom:0;cursor:pointer;transition:all .2s" onmouseenter="this.style.transform='translateY(-2px)'" onmouseleave="this.style.transform=''">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="font-size:36px;flex-shrink:0">📄</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${doc.title}">${doc.title}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">${doc.chunks} chunk${doc.chunks!==1?'s':''} · ${catBadge(doc.category)}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">${doc.created_at ? new Date(doc.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-xs" onclick="previewPDF('${doc.filename}', '${doc.pdf_url||''}')">👁 Preview</button>
              ${doc.pdf_url ? `<a href="${doc.pdf_url}" target="_blank" rel="noreferrer noopener" class="btn btn-secondary btn-xs">⬇️ Download</a>` : ''}
              <button class="btn btn-danger btn-xs" onclick="deleteDocAndChunks('${doc.filename}')">🗑 Delete</button>
            </div>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
  } catch(e) {
    el.innerHTML = emptyState('⚠️', 'Error loading documents', e.message);
  }
}

async function deleteDocAndChunks(filename) {
  if (!confirm('Delete this document and all its KB chunks? This cannot be undone.')) return;
  try {
    // Get all KB entries with this filename
    const { data } = await apiFetch('/knowledge-base?source=pdf_manual&limit=100');
    const chunks = data.filter(e => e.pdf_filename === filename);
    for (const chunk of chunks) {
      await apiFetch('/knowledge-base/' + chunk.id, { method: 'DELETE' });
    }
    toast('Document and ' + chunks.length + ' chunks deleted', 'success');
    renderKBDocs();
    renderKBList(1);
  } catch(e) { toast('Delete failed: ' + e.message, 'error'); }
}

function handlePDFDrop(e) {
  e.preventDefault();
  document.getElementById('pdf-upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) uploadPDF(file);
}

async function uploadPDF(file) {
  if (!file) return;
  const cat = document.getElementById('pdf-cat')?.value||'product_info';
  const res_el = document.getElementById('pdf-result');
  res_el.innerHTML = '<div style="color:var(--text-muted);display:flex;align-items:center;gap:8px">⏳ Uploading and extracting text...</div>';
  const form = new FormData();
  form.append('pdf', file);
  form.append('category', cat);
  try {
    const res = await fetch(`${API}/knowledge-base/upload-pdf`, { method:'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    res_el.innerHTML = `<div style="color:var(--success);display:flex;align-items:center;gap:8px">✅ Stored ${data.chunks_stored} chunks from ${data.total_chars.toLocaleString()} characters</div>`;
    if (data.pdf_url) {
      document.getElementById('pdf-preview-area').innerHTML = `
      <div class="card" style="margin-top:20px">
        <div class="card-title">👁 PDF Preview: ${file.name}</div>
        <iframe class="pdf-preview" src="${data.pdf_url}"></iframe>
      </div>`;
    }
    await refreshKBList();
  } catch (e) { res_el.innerHTML = `<div style="color:var(--danger);display:flex;align-items:center;gap:8px">✕ ${e.message}</div>`; }
}

function previewPDF(filename, url) {
  // Always use backend stream endpoint - most reliable regardless of storage config
  const previewUrl = API + '/knowledge-base/pdf/' + encodeURIComponent(filename);
  console.log('[PDF Preview] URL:', previewUrl);

  const existing = document.getElementById('pdf-modal-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'pdf-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';

  overlay.innerHTML =
    '<div style="background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:920px;height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)">' +
      '<div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px">' +
        '<span style="font-size:18px">📄</span>' +
        '<span style="font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + filename + '</span>' +
        '<button id="pdf-close-btn" style="background:var(--danger-bg);color:var(--danger);border:1px solid rgba(234,0,30,.2);padding:5px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600">✕ Close</button>' +
      '</div>' +
      '<iframe src="' + previewUrl + '" style="flex:1;border:none;width:100%;background:#fff"></iframe>' +
    '</div>';

  document.body.appendChild(overlay);

  document.getElementById('pdf-close-btn').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

      <div class="card-title">📤 Posting Configuration</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        <label class="toggle-switch"><input type="checkbox" ${posting_enabled?'checked':''} onchange="togglePosting(this.checked)"><span class="toggle-slider"></span></label>
        <div>
          <div style="font-weight:600;font-size:14px">${posting_enabled?'<span style="color:var(--success)">Posting Enabled</span>':'Posting Disabled'}</div>
          <div style="font-size:12px;color:var(--text-muted)">PoC Mode — off by default</div>
        </div>
      </div>
      <p style="font-size:13px;color:var(--text-secondary);line-height:1.6">When enabled, approved answers can be submitted back to BestBuy and Amazon product pages. This feature is disabled by default for the PoC demonstration.</p>
      ${!posting_enabled?`<div style="margin-top:14px;padding:12px 14px;background:var(--warning-bg);border:1px solid rgba(221,122,1,.3);border-radius:var(--radius-sm);font-size:12px;color:var(--warning);display:flex;align-items:center;gap:8px">⚠️ Enable the toggle above to allow answers to be posted to retailer platforms.</div>`:''}
    </div>
    <div class="card" id="post-queue-card"><div class="loading">⏳ Loading answered questions...</div></div>`;
    await refreshPostQueue();
  } catch (e) { el.innerHTML += emptyState('⚠️','Error',e.message); }
}

async function togglePosting(enabled) {
  try {
    await apiFetch('/post-answers/toggle', { method:'POST', body: JSON.stringify({ enabled }) });
    toast(enabled ? 'Posting to retailer sites enabled' : 'Posting disabled (PoC mode)', 'success');
    await loadPostAnswers();
  } catch(e) { toast('Failed to toggle posting: ' + e.message, 'error'); }
}

async function refreshPostQueue() {
  const card = document.getElementById('post-queue-card');
  if (!card) return;
  try {
    const { data } = await apiFetch('/questions?status=answered&limit=20');
    if (!data?.length) { card.innerHTML = emptyState('📤','No answered questions to post','Questions will appear here once approved.'); return; }
    card.innerHTML = `
    <div class="card-title">📋 Answered Questions — Post Queue</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Question</th><th>Retailer</th><th>Date Answered</th><th>Posted</th><th>Action</th></tr></thead>
      <tbody>${data.map(q=>`
        <tr>
          <td class="truncate" style="max-width:260px;font-weight:500">${q.question_text}</td>
          <td>${retailerBadge(q.retailer)}</td>
          <td style="font-size:12px;color:var(--text-muted)">${q.date_answered?new Date(q.date_answered).toLocaleDateString():'—'}</td>
          <td>${q.posted_to_retailer?'<span class="badge-pill badge-green">✓ Posted</span>':'<span class="badge-pill badge-gray">Not Posted</span>'}</td>
          <td>${!q.posted_to_retailer?`<button class="btn btn-primary btn-xs" onclick="postAnswer('${q.id}')">📤 Post</button>`:'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  } catch (e) { card.innerHTML = emptyState('⚠️','Error',e.message); }
}

async function postAnswer(id) {
  try { const r = await apiFetch(`/post-answers/${id}`, { method:'POST' }); toast(r.message||'Posted','success'); await refreshPostQueue(); }
  catch (e) { toast(e.message,'error'); }
}

// ── CONFIG ─────────────────────────────────────────────────────────
async function loadConfig_tab() {
  const el = document.getElementById('tab-config');
  el.innerHTML = `
  <div class="page-header">
    <div class="breadcrumb">🏠<span>/</span>Configuration</div>
    <h1>Configuration</h1>
    <p>App settings, API connection, scraping schedule, and theme preferences.</p>
  </div>
  <div class="loading">⏳ Loading...</div>`;
  try {
    const cfg = await apiFetch('/config');
    const sc = cfg.scraping_config || {};
    const savedApiUrl = localStorage.getItem('cqm_api_url') || '';
    const savedTheme  = localStorage.getItem('cqm_theme') || 'light';
    el.innerHTML = `
    <div class="page-header">
      <div class="breadcrumb">🏠<span>/</span>Configuration</div>
      <h1>Configuration</h1>
      <p>App settings, API connection, scraping schedule, and theme preferences.</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px">
      <div class="card">
        <div class="card-title">🔌 App Settings</div>
        <div class="form-group">
          <label class="form-label">Backend API URL</label>
          <input class="form-input" id="cfg-api-url" value="${savedApiUrl}" placeholder="https://your-app.onrender.com/api">
          <div class="form-hint">Your Render backend URL. Stored in browser — no redeployment needed.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Theme</label>
          <select class="form-select" id="cfg-theme">
            <option value="light" ${savedTheme==='light'?'selected':''}>☀️ Light Mode</option>
            <option value="dark" ${savedTheme==='dark'?'selected':''}>🌙 Dark Mode</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="saveAppSettings()">💾 Save App Settings</button>
      </div>
      <div class="card">
        <div class="card-title">🕷 Scraping Configuration</div>
        <div class="form-group">
          <label class="form-label">Scraping Engine</label>
          <select class="form-select" id="cfg-engine">
            <option value="scraperapi" ${sc.engine==='scraperapi'?'selected':''}>ScraperAPI (Free 1,000/month)</option>
            <option value="apify" ${sc.engine==='apify'?'selected':''}>Apify (Leadership Demo)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Auto-Scrape Interval (minutes, min 5)</label>
          <input class="form-input" type="number" id="cfg-interval" value="${sc.interval_minutes||10}" min="5">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:12px">
          <label class="toggle-switch"><input type="checkbox" id="cfg-auto" ${sc.auto_enabled?'checked':''}><span class="toggle-slider"></span></label>
          <span class="form-label" style="margin:0">Auto-scraping enabled</span>
        </div>
        <button class="btn btn-primary" onclick="saveConfig()">💾 Save Scraping Config</button>
      </div>
    </div>`;
  } catch (e) { el.innerHTML += emptyState('⚠️','Error',e.message); }
}

function saveAppSettings() {
  try {
    const apiUrl = document.getElementById('cfg-api-url')?.value?.trim();
    const theme  = document.getElementById('cfg-theme')?.value || 'light';
    if (apiUrl) {
      if (!apiUrl.startsWith('http')) return toast('API URL must start with http:// or https://', 'error');
      const url = apiUrl.endsWith('/api') ? apiUrl : apiUrl.replace(/\/$/, '') + '/api';
      localStorage.setItem('cqm_api_url', url);
      API = url;
      toast('API URL saved — reloading...', 'success');
    } else {
      toast('Please enter a backend API URL', 'error');
      return;
    }
    applyTheme(theme);
    setTimeout(() => location.reload(), 800);
  } catch(e) { toast('Failed to save settings: ' + e.message, 'error'); }
}

async function saveConfig() {
  const engine = document.getElementById('cfg-engine')?.value;
  const interval_minutes = parseInt(document.getElementById('cfg-interval')?.value)||10;
  const auto_enabled = document.getElementById('cfg-auto')?.checked||false;
  try {
    await apiFetch('/scrape/config', { method:'POST', body: JSON.stringify({ engine, interval_minutes, auto_enabled }) });
    scrapingConfig = { engine, interval_minutes, auto_enabled };
    setEngineUI(engine);
    const autoToggle = document.getElementById('auto-toggle');
    if (autoToggle) autoToggle.checked = auto_enabled;
    toast('Scraping configuration saved', 'success');
  } catch(e) { toast('Failed to save config: ' + e.message, 'error'); }
}

// ── HELPERS ────────────────────────────────────────────────────
function openRetailerUrl(url) {
  // Open with no referrer to bypass Amazon/BestBuy referrer blocks
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.rel = "noreferrer noopener";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
function retailerBadge(retailer) {
  if (!retailer) return '—';
  const map = {
    bestbuy: { cls: 'badge-blue',   label: '🛒 BestBuy' },
    amazon:  { cls: 'badge-orange', label: '📦 Amazon'  },
    target:  { cls: 'badge-red',    label: '🎯 Target'  },
  };
  const r = map[retailer] || { cls: 'badge-gray', label: retailer };
  return `<span class="badge-pill ${r.cls}">${r.label}</span>`;
}

function catBadge(cat) {
  const map = { product_info:'badge-blue', pricing:'badge-green', warranty:'badge-purple', compatibility:'badge-blue', usage:'badge-orange', complaints:'badge-red', returns:'badge-yellow', other:'badge-gray' };
  return cat ? `<span class="badge-pill ${map[cat]||'badge-gray'}">${cat.replace('_',' ')}</span>` : '—';
}

function sentBadge(s) {
  const map = { positive:'badge-green', neutral:'badge-gray', negative:'badge-red' };
  const icons = { positive:'fa-face-smile', neutral:'fa-face-meh', negative:'fa-face-frown' };
  return s ? `<span class="badge-pill ${map[s]||'badge-gray'}"> ${s}</span>` : '—';
}

function confidenceBadge(c) {
  if (c == null) return '—';
  const color = c >= 70 ? 'var(--success)' : c >= 40 ? 'var(--warning)' : 'var(--danger)';
  return `<div style="min-width:64px">
    <span style="color:${color};font-weight:700;font-size:13px">${c}%</span>
    <div class="confidence-bar"><div class="confidence-fill" style="width:${c}%;background:${color}"></div></div>
  </div>`;
}

function emptyState(icon, title, subtitle, btnLabel, btnFn) {
  return `<div class="empty">
    <div class="empty-icon"></div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${subtitle||''}</div>
    ${btnLabel ? `<button class="btn btn-primary btn-sm" onclick="${btnFn}">+ ${btnLabel}</button>` : ''}
  </div>`;
}

function pagination(total, page, limit, fn) {
  const pages = Math.ceil(total / limit);
  if (pages <= 1) return '';
  const btns = [];
  for (let i = 1; i <= Math.min(pages, 7); i++) {
    btns.push(`<button class="page-btn ${i===page?'active':''}" onclick="${fn}(${i})">${i}</button>`);
  }
  return `<div class="pagination">${btns.join('')}<span style="font-size:12px;color:var(--text-muted);margin-left:4px">${total} total</span></div>`;
}
